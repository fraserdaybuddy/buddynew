    --paper:        #ffd166;
    --skip:         #666670;
    --now:          rgba(255,209,102,0.15);
    --now-border:   #ffd166;

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    min-height: 100vh;
    padding: 24px 20px 60px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .header .subtitle { color: var(--muted2); font-size: 11px; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .legend-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }
  .legend-label { color: var(--muted2); font-size: 11px; }

  .priority-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .pl { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted2); }
  .pl-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
  }

  /* ── Calendar grid ── */
  .calendar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 1000px) { .calendar { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .calendar { grid-template-columns: 1fr; } }

  .month {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    min-height: 120px;
  }
  .month-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Event blocks ── */
  .event {
    padding: 6px 8px;
    border-radius: 4px;
    margin-bottom: 5px;
    cursor: pointer;
    border-left: 3px solid transparent;
    position: relative;
    transition: filter 0.15s;
  }
  .event:hover { filter: brightness(1.2); }
  .event:last-child { margin-bottom: 0; }

  .event.tennis  { background: var(--tennis-dim);  border-left-color: var(--tennis);  }
  .event.darts   { background: var(--darts-dim);   border-left-color: var(--darts);   }
  .event.snooker { background: var(--snooker-dim); border-left-color: var(--snooker); }

  /* Current / next-30 highlight */
  .event.now    { background: var(--now); border-left-color: var(--now-border); box-shadow: 0 0 0 1px var(--now-border); }
  .event.soon   { opacity: 1; border-left-style: dashed; }

  .event-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
  }
  .event-name {
    font-weight: 600;
    font-size: 11px;
    line-height: 1.3;
    flex: 1;
  }
  .event.tennis  .event-name { color: var(--tennis);  }
  .event.darts   .event-name { color: var(--darts);   }
  .event.snooker .event-name { color: var(--snooker); }
  .event.now     .event-name { color: var(--now-border); }

  .priority {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .priority.top    { background: rgba(0,255,135,0.15); color: var(--top); }
  .priority.good   { background: rgba(68,221,136,0.12); color: var(--good); }
  .priority.paper  { background: rgba(255,209,102,0.12); color: var(--paper); }
  .priority.skip   { background: rgba(102,102,112,0.12); color: var(--skip); }

  .event-meta {
    font-size: 10px;
    color: var(--muted2);
    margin-top: 2px;
    line-height: 1.4;
  }
  .event-dates { color: var(--muted); font-size: 10px; }

  /* ── Tooltip ── */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 100;
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 240px;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);

    font-weight: 600;

  .tooltip-hr    { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  /* empty month */
  .month-empty { color: var(--muted); font-size: 10px; padding: 4px 0; }

// ── Build calendar ─────────────────────────────────────────────────────────
const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

function parseDate(s) { return new Date(s + "T00:00:00"); }

function dateInMonth(event, year, month) {
  // month is 0-indexed
  const start = parseDate(event.start);
  const end   = parseDate(event.end);
  const mStart = new Date(year, month, 1);
  const mEnd   = new Date(year, month + 1, 0);
  return start <= mEnd && end >= mStart;
}

function formatDates(start, end) {
  const s = parseDate(start), e = parseDate(end);
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  if (s.getMonth() === e.getMonth())
    return `${s.getDate()}–${e.getDate()} ${months[s.getMonth()]}`;
  return `${s.getDate()} ${months[s.getMonth()]} – ${e.getDate()} ${months[e.getMonth()]}`;
}

function isNow(event) {
  const s = parseDate(event.start), e = parseDate(event.end);
  return TODAY >= s && TODAY <= e;
}

function isSoon(event) {
  const s = parseDate(event.start);
  return s > TODAY && s <= SOON_END;
}

function priorityLabel(p) {
  const map = { top:"TOP", good:"GOOD", paper:"PAPER", skip:"SKIP" };
  return map[p] || p.toUpperCase();
}

function sportColor(sport) {
  return { tennis:"var(--tennis)", darts:"var(--darts)", snooker:"var(--snooker)" }[sport] || "#888";
}

      div.innerHTML = `
        <div class="event-header">
          <div class="event-name">${ev.name}${now ? ' ▶' : ''}</div>
          <span class="priority ${ev.priority}">${label}</span>
        </div>
        <div class="event-meta">
          <span class="event-dates">${dates}</span>
          ${ev.surface ? ` · ${ev.surface}` : ''}
          ${ev.format ? ` · ${ev.format}` : ''}
        </div>
      `;

      // Tooltip
      div.addEventListener("mouseenter", (e) => {
        tip.innerHTML = `
          <div class="tooltip-title" style="color:${sportColor(ev.sport)}">${ev.name}</div>
          <div class="tooltip-row"><span class="tooltip-label">Dates</span><span class="tooltip-val">${dates}</span></div>
          ${ev.tier ? `<div class="tooltip-row"><span class="tooltip-label">Tier</span><span class="tooltip-val">${ev.tier}</span></div>` : ''}
          ${ev.surface ? `<div class="tooltip-row"><span class="tooltip-label">Surface</span><span class="tooltip-val">${ev.surface}</span></div>` : ''}
          <div class="tooltip-row"><span class="tooltip-label">Format</span><span class="tooltip-val">${ev.format || '—'}</span></div>
          <hr class="tooltip-hr">
          <div class="tooltip-row"><span class="tooltip-label">Markets</span><span class="tooltip-val">${ev.markets || '—'}</span></div>
          <div class="tooltip-row"><span class="tooltip-label">Priority</span><span class="tooltip-val" style="color:${ev.priority==='top'?'var(--top)':ev.priority==='good'?'var(--good)':ev.priority==='paper'?'var(--paper)':'var(--skip)'}">${label}</span></div>
          ${ev.note ? `<hr class="tooltip-hr"><div style="font-size:10px;color:var(--muted2);line-height:1.5">${ev.note}</div>` : ''}
        `;
        tip.classList.add("visible");
        positionTip(e);
      });
      div.addEventListener("mousemove", positionTip);
      div.addEventListener("mouseleave", () => tip.classList.remove("visible"));

      monthEl.appendChild(div);
    });
  }

  cal.appendChild(monthEl);
}

function positionTip(e) {
  const x = e.clientX + 14;
  const y = e.clientY + 14;
  const w = tip.offsetWidth  || 260;
  const h = tip.offsetHeight || 160;
  tip.style.left = (x + w > window.innerWidth  ? e.clientX - w - 14 : x) + "px";
  tip.style.top  = (y + h > window.innerHeight ? e.clientY - h - 14 : y) + "px";
}
</script>
</body>
</html>
